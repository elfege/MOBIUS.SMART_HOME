<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0_SMART_HOME - Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #4fc3f7;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 195, 247, 0.2);
            border-top: 4px solid #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            color: #999;
            margin-bottom: 0.5rem;
        }
        #countdown {
            font-size: 1.2rem;
            color: #4fc3f7;
            margin-top: 1rem;
        }
        #status {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>0_SMART_HOME</h1>
        <div class="spinner"></div>
        <p>Application is starting up...</p>
        <p>This page will refresh automatically.</p>
        <div id="countdown">Retrying in <span id="timer">10</span>s</div>
        <div id="status"></div>
    </div>
    <script>
        let seconds = 10;
        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        let attempts = 0;

        async function checkHealth() {
            attempts++;
            statusEl.textContent = `Attempt ${attempts}...`;
            try {
                const resp = await fetch('/api/health', { signal: AbortSignal.timeout(3000) });
                if (resp.ok) {
                    statusEl.textContent = 'Backend is up! Redirecting...';
                    window.location.reload();
                    return;
                }
            } catch (e) {
                // Backend still down
            }
            seconds = 10;
            countdown();
        }

        function countdown() {
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                checkHealth();
                return;
            }
            seconds--;
            setTimeout(countdown, 1000);
        }

        countdown();
    </script>
</body>
</html>
