# =============================================================================
# Nginx Configuration for 0_MOBIUS.SMART_HOME
# Reverse proxy to FastAPI application with HTTPS
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # Upstream FastAPI application
    upstream fastapi_app {
        server smart-home:5000;
    }

    # -------------------------------------------------------------------------
    # HTTP server - redirects to HTTPS unless behind reverse proxy
    # When the upstream proxy (0_MOBIUS.PROXY) sends X-Forwarded-Proto: https,
    # serve directly instead of redirecting — SSL was already terminated.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # If behind proxy with SSL already terminated, serve content directly
        set $do_redirect 1;
        if ($http_x_forwarded_proto = "https") {
            set $do_redirect 0;
        }

        # Custom error pages when backend is down
        error_page 502 503 504 /reloading.html;
        location = /reloading.html {
            root /etc/nginx/html;
        }

        # Static files
        location /static/ {
            alias /usr/share/nginx/html/static/;
            add_header Cache-Control "no-cache";
        }

        # SSE event stream (long-lived, no buffering)
        location /api/events {
            if ($do_redirect = 1) {
                return 301 https://$host:8445$request_uri;
            }
            proxy_pass http://fastapi_app;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # WebSocket endpoint (dashboard real-time updates)
        location /ws/ {
            if ($do_redirect = 1) {
                return 301 https://$host:8445$request_uri;
            }
            proxy_pass http://fastapi_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # All other requests
        location / {
            if ($do_redirect = 1) {
                return 301 https://$host:8445$request_uri;
            }
            proxy_intercept_errors on;
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (self-signed, generated by start.sh)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Custom error pages when backend is down
        error_page 502 503 504 /reloading.html;

        location = /reloading.html {
            root /etc/nginx/html;
        }

        # Serve container startup logs for the reloading page terminal
        location /logs/ {
            alias /var/log/app/;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Cache-Control 'no-store';
            add_header Access-Control-Allow-Origin '*';
        }

        # Health check endpoint (for load balancers, bypasses proxy)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Static files (served directly by nginx for performance)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            add_header Cache-Control "no-cache";
        }

        # PostgREST API (optional direct access)
        location /postgrest/ {
            rewrite ^/postgrest/(.*) /$1 break;
            proxy_pass http://postgrest:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # SSE event stream (long-lived connections, no buffering)
        location /api/events {
            proxy_pass http://fastapi_app;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # WebSocket endpoint (dashboard real-time updates)
        location /ws/ {
            proxy_pass http://fastapi_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # FastAPI application (all other requests)
        location / {
            proxy_intercept_errors on;
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }
    }
}
