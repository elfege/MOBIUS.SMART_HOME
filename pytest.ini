[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    unit: Tier 1 — pure function tests, no I/O, no async setup
    service: Tier 2 — service-level tests with mocked I/O boundaries
    integration: Tier 3 — requires ephemeral or live postgres+postgrest
    e2e: Tier 4 — requires running smart-home app stack
    slow: Test takes >1s — opt in via -m slow

# Default: run unit + service tiers. Integration/e2e opt-in.
addopts =
    --strict-markers
    -ra
    --tb=short

filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:websockets.*
    ignore::PendingDeprecationWarning
