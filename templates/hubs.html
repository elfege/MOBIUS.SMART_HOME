{% extends "base.html" %}

{% block title %}Hubs{% endblock %}

{% block content %}
<div class="hubs-page" style="max-width:1100px;margin:0 auto;padding:1rem;">
    <div class="wizard-title-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div>
            <a href="/" class="back-link">&larr; Dashboard</a>
            <h2 style="margin:0.5rem 0 0;">Hub Configuration</h2>
            <p style="opacity:.7;margin:.25rem 0 0;">
                Edit Hubitat hub settings. Changes are applied to the running app immediately;
                device routing caches are invalidated on save.
            </p>
        </div>
        <button class="btn btn-primary" id="btn-add-hub">+ Add hub</button>
    </div>

    <div id="hubs-status" style="opacity:.7;font-size:.9rem;margin-bottom:.5rem;">Loading…</div>
    <div id="hubs-list"></div>

    <!-- Hidden template for one hub card -->
    <template id="hub-card-template">
        <form class="hub-card" data-hub-id="" style="border:1px solid var(--border-color,#333);border-radius:8px;padding:1rem;margin-bottom:1rem;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1rem;">
                <label>Name
                    <input name="hub_name" type="text" required pattern="^[a-zA-Z0-9_-]+$"
                           title="Letters, digits, _ or -"/>
                </label>
                <label>IP
                    <input name="hub_ip" type="text" required
                           pattern="^(\d{1,3}\.){3}\d{1,3}$" title="IPv4"/>
                </label>
                <label>Maker API app number
                    <input name="maker_api_app_number" type="text" required
                           pattern="^\d+$" title="Numeric"/>
                </label>
                <label>Token env-var name
                    <input name="maker_api_token_env" type="text" required
                           pattern="^[A-Z_][A-Z0-9_]*$"
                           title="Uppercase env var name (e.g. HUBITAT_API_TOKEN_OTHER_HUB_1)"/>
                </label>
                <label style="display:flex;align-items:center;gap:.5rem;">
                    <input name="is_primary" type="checkbox"/> Primary (default client)
                </label>
                <label style="display:flex;align-items:center;gap:.5rem;">
                    <input name="is_enabled" type="checkbox"/> Enabled
                </label>
            </div>
            <div style="margin-top:.75rem;display:flex;gap:.5rem;justify-content:flex-end;">
                <span class="hub-card-status" style="margin-right:auto;font-size:.85rem;opacity:.7;"></span>
                <button type="button" class="btn btn-danger btn-delete">Delete</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </template>
</div>

<script type="module" src="/static/js/controllers/hubs-controller.js"></script>
{% endblock %}
