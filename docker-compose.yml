# =============================================================================
# 0_MOBIUS.SMART_HOME Docker Compose Configuration
# Multi-service orchestration for Hubitat automation system
#
# ALL configuration comes from environment variables exported by start.sh
# which pulls from AWS Secrets Manager. NO .env file.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Webhook Dispatcher - Central hub for Hubitat events
  # Receives from Hubitat, forwards to all apps (0_MOBIUS.TILES, 0_MOBIUS.SMART_HOME, etc.)
  # container_name is IDENTICAL to 0_MOBIUS.TILES — Docker runs only one.
  # start.sh skips this if already running from another project.
  # ---------------------------------------------------------------------------
  webhook-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dispatcher
    container_name: webhook-dispatcher
    ports:
      - "${WEBHOOK_PORT:-5050}:5050"
    environment:
      PYTHONUNBUFFERED: "1"
      WEBHOOK_PORT: "5050"
      WEBHOOK_TARGETS: ${WEBHOOK_TARGETS:-http://smarthome-app:${APP_INTERNAL_PORT:-5000}/api/webhook/event,http://tiles-app:80/api/webhook/event}
    # Bind the dispatcher source from the host so edits persist across
    # container recreates. Without this, the only copy of the script is
    # the one COPYed into the image at build time, and changes (such as
    # the _hub_ip injection that drives the router's mesh-mirror filter)
    # silently revert every restart cycle. Image rebuild only required
    # when dependencies change.
    volumes:
      - ./services/webhook_dispatcher.py:/app/webhook_dispatcher.py:ro
    restart: unless-stopped
    networks:
      - smarthome-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # FastAPI Application - Core automation engine
  # ---------------------------------------------------------------------------
  smart-home:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarthome-app
    # Dev override: enable hot reload (Dockerfile CMD is production-clean)
    # Output piped through tee so nginx can serve startup.log on the reloading page
    command: ["sh", "-c", "uvicorn app:app --host 0.0.0.0 --port 5000 --workers 1 --timeout-keep-alive 120 --reload --reload-dir /app 2>&1 | tee /app/logs/startup.log"]
    ports:
      - "${APP_EXTERNAL_PORT:-5001}:${APP_INTERNAL_PORT:-5000}"
    environment:
      PYTHONUNBUFFERED: "1"

      # HOT-RELOAD NOTE (verified 2026-06-24): uvicorn --reload's WatchFiles DOES
      # detect edits to the DIRECTORY mounts (./apps, ./services, ./templates,
      # ./static) across the bind mount on this host — no polling needed. The ONE
      # exception is ./app.py, mounted as a SINGLE FILE (./app.py:/app/app.py):
      # atomic-write editors replace the host inode, which a file-level bind mount
      # doesn't track, so app.py edits are invisible in-container until ./start.sh
      # (or a docker cp). Keep app logic in apps/ + services/ for live reload;
      # app.py (routes/wiring/migrations) changes need ./start.sh.

      # Hubitat credentials (standardized names, mapped from AWS by start.sh)
      HUBITAT_API_TOKEN_MAIN: ${HUBITAT_API_TOKEN_MAIN}
      HUBITAT_HUB_IP_MAIN: ${HUBITAT_HUB_IP_MAIN}
      HUBITAT_API_NUMBER_MAIN: ${HUBITAT_API_NUMBER_MAIN}

      HUBITAT_API_TOKEN_OTHER_HUB_1: ${HUBITAT_API_TOKEN_OTHER_HUB_1:-}
      HUBITAT_HUB_IP_OTHER_HUB_1: ${HUBITAT_HUB_IP_OTHER_HUB_1:-}
      HUBITAT_API_NUMBER_OTHER_HUB_1: ${HUBITAT_API_NUMBER_OTHER_HUB_1:-}

      HUBITAT_API_TOKEN_OTHER_HUB_2: ${HUBITAT_API_TOKEN_OTHER_HUB_2:-}
      HUBITAT_HUB_IP_OTHER_HUB_2: ${HUBITAT_HUB_IP_OTHER_HUB_2:-}
      HUBITAT_API_NUMBER_OTHER_HUB_2: ${HUBITAT_API_NUMBER_OTHER_HUB_2:-}

      HUBITAT_API_TOKEN_OTHER_HUB_3: ${HUBITAT_API_TOKEN_OTHER_HUB_3:-}
      HUBITAT_HUB_IP_OTHER_HUB_3: ${HUBITAT_HUB_IP_OTHER_HUB_3:-}
      HUBITAT_API_NUMBER_OTHER_HUB_3: ${HUBITAT_API_NUMBER_OTHER_HUB_3:-}

      # App API authentication token
      APP_API_TOKEN: ${APP_API_TOKEN}

      # Database configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "${POSTGRES_INTERNAL_PORT:-5432}"
      POSTGRES_DB: ${POSTGRES_DB:-smarthome}
      POSTGRES_USER: ${POSTGRES_USER:-smarthome_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGREST_URL: http://postgrest:${POSTGREST_INTERNAL_PORT:-3001}

      # Server configuration
      SERVER_IP: ${SERVER_IP:-<LAN_IP>}

      # Sonos announcement subsystem (services/sonos). SSDP multicast doesn't
      # cross the Docker bridge, so seed the speaker IPs for in-container
      # discovery; unicast control + room-name lookup work over the bridge.
      # Override in .env if DHCP moves them (reserved leases recommended).
      SONOS_SPEAKER_IPS: ${SONOS_SPEAKER_IPS:-<LAN_IP>,<LAN_IP>,<LAN_IP>,<LAN_IP>,<LAN_IP>,<LAN_IP>,<LAN_IP>}

      # Device Commander configuration (defensive command execution)
      DEVICE_CMD_TIMEOUT: "${DEVICE_CMD_TIMEOUT:-30}"
      DEVICE_CMD_VERIFY_RETRIES: "${DEVICE_CMD_VERIFY_RETRIES:-3}"
      DEVICE_CMD_VERIFY_DELAY: "${DEVICE_CMD_VERIFY_DELAY:-1.0}"
      DEVICE_CMD_OPERATION_RETRIES: "${DEVICE_CMD_OPERATION_RETRIES:-2}"
      DEVICE_CMD_OPERATION_DELAY: "${DEVICE_CMD_OPERATION_DELAY:-2.0}"

      # Device cache refresh (background verification against live state)
      DEVICE_CACHE_REFRESH_INTERVAL: "${DEVICE_CACHE_REFRESH_INTERVAL:-120}"

      # Samsung TV client configuration
      SAMSUNG_TV_IP: "${SAMSUNG_TV_IP:-<LAN_IP>}"
      SAMSUNG_TV_MAC: "${SAMSUNG_TV_MAC:-AABBCCDDEEFF}"
      SAMSUNG_TV_TOKEN: "${SAMSUNG_TV_TOKEN:-}"
      SAMSUNG_TV_SSL: "${SAMSUNG_TV_SSL:-true}"
      SAMSUNG_TV_NAME: "${SAMSUNG_TV_NAME:-living_room_tv}"
      SAMSUNG_TV_APP_NAME: "${SAMSUNG_TV_APP_NAME:-Smart Home Controller}"
    volumes:
      # Mount source for development (hot reload via uvicorn --reload)
      - ./app.py:/app/app.py
      - ./apps:/app/apps
      - ./services:/app/services
      # Restart trigger tmpfs (canonical RESTART.1-4): the UI Restart button
      # (POST /api/restart) writes "reboot" here; the host-side
      # smarthome-restart-watcher.service picks it up and runs start.sh.
      - /dev/shm/smarthome-restart:/dev/shm/smarthome-restart
      - ./models:/app/models
      - ./config:/app/config
      - ./templates:/app/templates
      - ./static:/app/static
      # Read-only mount of the shared MOBIUS local CA so the /install-cert
      # routes (services/cert_routes.py) can serve ca.pem. This is the SAME
      # PEM nginx serves as the TLS root, so the fingerprint on the install
      # page always matches the live certificate.
      - ./nginx/certs:/app/nginx/certs:ro
      - app_logs:/app/logs
      - ./state:/app/state
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    restart: unless-stopped
    # autoheal sidecar (see below) restarts this container when the Docker
    # healthcheck reports unhealthy. Without this label the sidecar ignores it.
    labels:
      autoheal: "true"
    networks:
      - smarthome-net
    healthcheck:
      # Explicit urllib timeout so the probe cannot inherit the long urllib
      # default — if the event loop is hung, the connect()/recv() must fail
      # within the Docker `timeout` envelope (5s), not after a kernel-level
      # SO_RCVTIMEO of minutes.
      test: ["CMD", "python3", "-c", "import urllib.request,socket; socket.setdefaulttimeout(4); urllib.request.urlopen('http://localhost:5000/api/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 20s

  # ---------------------------------------------------------------------------
  # PostgreSQL - Database for instances, subscriptions, device cache
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:${POSTGRES_INTERNAL_PORT:-5432}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smarthome}
      POSTGRES_USER: ${POSTGRES_USER:-smarthome_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./psql/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarthome_api} -d ${POSTGRES_DB:-smarthome}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smarthome-net

  # ---------------------------------------------------------------------------
  # PostgREST - Auto-generated REST API from PostgreSQL schema
  # ---------------------------------------------------------------------------
  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: smarthome-postgrest
    ports:
      - "${POSTGREST_EXTERNAL_PORT:-3002}:${POSTGREST_INTERNAL_PORT:-3001}"
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-smarthome_api}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-smarthome}
      # Schema split (2026-05-26): PostgREST exposes the single `api` schema,
      # which holds 1:1 views over the dshub/dsapp/dscore storage schemas
      # (Option B). PGRST_DB_SCHEMAS is the v12 key (plural); keep the singular
      # too for belt-and-suspenders.
      PGRST_DB_SCHEMAS: api
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: smarthome_anon
      PGRST_SERVER_PORT: "${POSTGREST_INTERNAL_PORT:-3001}"
      PGRST_OPENAPI_MODE: ignore-privileges
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smarthome-net

  # ---------------------------------------------------------------------------
  # Nginx - HTTPS reverse proxy and static file serving
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: smarthome-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8082}:80"
      - "${NGINX_HTTPS_PORT:-8445}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/etc/nginx/html:ro
      - ./static:/usr/share/nginx/html/static:ro
      - app_logs:/var/log/app:ro
    depends_on:
      - smart-home
    restart: unless-stopped
    networks:
      - smarthome-net

  # ---------------------------------------------------------------------------
  # Matter Server - Direct Matter protocol device control
  # Provides WebSocket API for commissioning, commanding, and monitoring
  # Matter-compatible devices without going through Hubitat.
  # MUST use host networking for mDNS device discovery.
  # ---------------------------------------------------------------------------
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: smarthome-matter-server
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - matter_data:/data/
      - /run/dbus:/run/dbus
    environment:
      MATTER_SERVER__INSTANCE_NAME: "0_MOBIUS.SMART_HOME"
      MATTER_SERVER__PORT: "${MATTER_PORT:-5580}"
      MATTER_SERVER__VENDORID: "65521"
      MATTER_SERVER__FABRICID: "1"

  # ---------------------------------------------------------------------------
  # autoheal — restarts any container labeled `autoheal=true` when the Docker
  # healthcheck reports it unhealthy. Closes the gap left by `restart:
  # unless-stopped`, which only acts on process exit and ignores healthcheck
  # state entirely. The 2026-05-27 incident sat unhealthy for hours because
  # nothing was wired to act on the signal Docker was already producing.
  #
  # Image: willfarrell/autoheal — small, single-purpose, watches Docker events
  # via the bind-mounted socket. AUTOHEAL_CONTAINER_LABEL=true means it ONLY
  # touches containers explicitly opted in via the `autoheal=true` label, so
  # a misfire can't ripple across the host.
  # ---------------------------------------------------------------------------
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: smarthome-autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"   # restart containers tagged autoheal=true
      AUTOHEAL_INTERVAL: "10"                 # poll Docker every 10s
      AUTOHEAL_START_PERIOD: "30"             # grace before first check after start
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "10"     # SIGTERM grace before SIGKILL on restart
      CURL_TIMEOUT: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# =============================================================================
# Networks
# =============================================================================
networks:
  smarthome-net:
    external: true
    name: smarthome_smarthome-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    external: true
    name: 0_smart_home_postgres_data
  app_logs:
    driver: local
  matter_data:
    driver: local
