<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Home{% endblock %} - MOBIUS.HOME</title>
    <link rel="icon" type="image/png" href="/static/img/mobius.png">
    <link rel="apple-touch-icon" href="/static/img/mobius.png">
    <meta name="apple-mobile-web-app-title" content="MOBIUS.HOME">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- CSS Variables (must load first) -->
    <link rel="stylesheet" href="/static/css/variables.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
    <!-- KPI Modal CSS -->
    <link rel="stylesheet" href="/static/css/kpi-modal.css">

    <!-- Chart.js (lightweight charting for KPI dashboards) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <a href="/">
                    <img src="/static/img/mobius.png" alt="MOBIUS.HOME" class="logo-img">
                    <span class="logo-text">MOBIUS<span class="logo-dot">.</span>HOME</span>
                </a>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/matter" class="nav-link">Matter</a>
                <a href="/samsung-tv" class="nav-link">TV</a>
                <a href="/instance/new" class="nav-link btn-add">+ Add</a>
                <span class="nav-sep"></span>
                <a href="https://mobius.tiles" class="nav-link nav-app">TILES</a>
                <a href="https://mobius.nvr" class="nav-link nav-app">NVR</a>
            </nav>
        </div>
    </header>

    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <p>MOBIUS.HOME</p>
    </footer>

    <!-- Main JS -->
    <script type="module" src="/static/js/main.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
