<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBIUS.HOME - Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            transition: justify-content 0.3s ease;
        }

        body.with-terminal {
            justify-content: flex-start;
            padding-top: 1.5rem;
        }

        .header {
            text-align: center;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #4fc3f7;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 195, 247, 0.2);
            border-top: 4px solid #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        p {
            color: #999;
            margin-bottom: 0.5rem;
        }

        #countdown {
            font-size: 1.2rem;
            color: #4fc3f7;
            margin-top: 1rem;
        }

        #status {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }

        /* ---- Virtual Terminal ---- */

        #terminal-container {
            display: none;
            margin-top: 1.5rem;
            width: 90vw;
            max-width: 1400px;
            height: 55vh;
            min-width: 300px;
            min-height: 120px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
            resize: both;
            flex-shrink: 0;
        }

        .terminal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1e1e;
            padding: 5px 12px;
            border-bottom: 1px solid #333;
            user-select: none;
            cursor: default;
        }

        .terminal-bar-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red    { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green  { background: #27c93f; }

        .terminal-title {
            color: #888;
            font-size: 0.75rem;
            margin-left: 8px;
            font-family: 'Courier New', monospace;
        }

        .terminal-hint {
            color: #555;
            font-size: 0.65rem;
        }

        #terminal-output {
            color: #b5bd68;
            font-family: 'Courier New', 'Lucida Console', monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            padding: 8px 12px;
            margin: 0;
            overflow: auto;
            height: calc(100% - 30px);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Scrollbar styling for the terminal */
        #terminal-output::-webkit-scrollbar {
            width: 8px;
        }

        #terminal-output::-webkit-scrollbar-track {
            background: #0d0d0d;
        }

        #terminal-output::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        #terminal-output::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Highlight ERROR lines */
        .log-error { color: #cc6666; }
        .log-warning { color: #f0c674; }
        .log-info { color: #b5bd68; }
        .log-traceback { color: #cc6666; font-style: italic; }

        /* ---- Dev-restart banner ----
         * Shown ONLY when a dev armed nginx/html/dev-restart.json (and it has
         * not expired). Tells the operator this outage is an INTENTIONAL dev
         * restart, not a breakage — the fix for the 2026-07-13 12:04 incident
         * where a restart looked like a broken app. Dark red + white text (high
         * luminance contrast) + a thick bright border + a ▲ badge: visibility
         * carried by luminance and shape, not hue alone (CVD-safe accessibility). */
        #dev-banner {
            display: none;
            width: 100%;
            max-width: 720px;
            background: #8B0000;
            color: #ffffff;
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.45);
        }
        #dev-banner .dev-badge {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.92;
            margin-bottom: 0.4rem;
        }
    </style>
</head>
<body>
    <div id="dev-banner" role="alert">
        <span class="dev-badge">&#9650; Developer restart in progress</span>
        <span id="dev-banner-msg"></span>
    </div>
    <div class="header">
        <h1>MOBIUS.HOME</h1>
        <div class="spinner"></div>
        <p>Application is starting up...</p>
        <p>This page will refresh automatically.</p>
        <div id="countdown">Retrying in <span id="timer">10</span>s</div>
        <div id="status"></div>
    </div>

    <div id="terminal-container">
        <div class="terminal-bar">
            <div class="terminal-bar-left">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="terminal-title">smarthome-app &mdash; startup.log</span>
            </div>
            <span class="terminal-hint">drag corner to resize</span>
        </div>
        <pre id="terminal-output">Waiting for logs...</pre>
    </div>

    <script>
        let seconds = 10;
        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        const termContainer = document.getElementById('terminal-container');
        const termOutput = document.getElementById('terminal-output');
        let attempts = 0;
        let logInterval = null;
        let terminalVisible = false;

        /**
         * Strip ANSI escape codes from text (uvicorn may emit them
         * even though tee usually suppresses TTY detection).
         */
        function stripAnsi(str) {
            return str.replace(/\x1b\[[0-9;]*[A-Za-z]/g, '');
        }

        /**
         * Apply basic syntax highlighting to log lines.
         * Returns HTML string with <span> wrappers.
         */
        function highlightLog(text) {
            const lines = text.split('\n');
            // Keep last 500 lines to avoid browser lag on huge logs
            const tail = lines.length > 500 ? lines.slice(-500) : lines;
            return tail.map(function(line) {
                // Traceback lines
                if (/^\s+(File |Traceback |.*Error:)/.test(line)) {
                    return '<span class="log-traceback">' + escapeHtml(line) + '</span>';
                }
                // ERROR level
                if (/\bERROR\b|Error:|IndentationError|SyntaxError|ImportError|ModuleNotFoundError/.test(line)) {
                    return '<span class="log-error">' + escapeHtml(line) + '</span>';
                }
                // WARNING level
                if (/\bWARN(ING)?\b/.test(line)) {
                    return '<span class="log-warning">' + escapeHtml(line) + '</span>';
                }
                return escapeHtml(line);
            }).join('\n');
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        /**
         * Show the terminal panel and start fetching logs.
         */
        function showTerminal() {
            if (terminalVisible) return;
            terminalVisible = true;
            document.body.classList.add('with-terminal');
            termContainer.style.display = 'block';
            fetchLogs();
            logInterval = setInterval(fetchLogs, 2000);
        }

        /**
         * Fetch the startup log file from nginx and render it.
         */
        async function fetchLogs() {
            try {
                var resp = await fetch('/logs/startup.log', {
                    signal: AbortSignal.timeout(3000),
                    cache: 'no-store'
                });
                if (resp.ok) {
                    var text = await resp.text();
                    text = stripAnsi(text);
                    if (text.trim().length === 0) {
                        termOutput.innerHTML = '<span style="color:#555;">Log file is empty. Container may still be initializing...</span>';
                        return;
                    }
                    // Auto-scroll if user is near the bottom
                    var wasAtBottom = termOutput.scrollHeight - termOutput.scrollTop <= termOutput.clientHeight + 60;
                    termOutput.innerHTML = highlightLog(text);
                    if (wasAtBottom) {
                        termOutput.scrollTop = termOutput.scrollHeight;
                    }
                } else if (resp.status === 404) {
                    termOutput.innerHTML = '<span style="color:#555;">Log file not found. Container may not have started yet.</span>';
                }
            } catch (e) {
                // Log endpoint not reachable — keep trying silently
            }
        }

        /**
         * Dev-restart banner: if a dev armed nginx/html/dev-restart.json and it
         * has not expired, show the dark-red banner explaining this outage is an
         * INTENTIONAL dev restart, not a failure. Served statically by nginx, so
         * it works while the app is down (the very outage it explains). Re-checked
         * each cycle so it appears if armed after load and AUTO-HIDES once the
         * flag's `until` passes (operator asked it auto-resolve after a few min).
         */
        async function checkDevBanner() {
            var banner = document.getElementById('dev-banner');
            try {
                var resp = await fetch('/static/dev-restart.json', {
                    cache: 'no-store',
                    signal: AbortSignal.timeout(2500)
                });
                if (!resp.ok) { banner.style.display = 'none'; return; }
                var flag = await resp.json();
                var active = flag && flag.active === true;
                if (active && flag.until) {
                    var untilMs = Date.parse(flag.until);
                    if (isFinite(untilMs) && Date.now() >= untilMs) active = false; // expired
                }
                if (active) {
                    document.getElementById('dev-banner-msg').textContent =
                        flag.message || 'App restarting due to ongoing development.';
                    banner.style.display = 'block';
                } else {
                    banner.style.display = 'none';
                }
            } catch (e) {
                banner.style.display = 'none'; // flag unreachable -> no banner
            }
        }

        /**
         * Health check: try reaching the backend, show terminal on first failure.
         */
        async function checkHealth() {
            checkDevBanner();
            attempts++;
            statusEl.textContent = 'Attempt ' + attempts + '...';
            try {
                var resp = await fetch('/api/health', { signal: AbortSignal.timeout(3000) });
                if (resp.ok) {
                    statusEl.textContent = 'Backend is up! Redirecting...';
                    if (logInterval) clearInterval(logInterval);
                    window.location.reload();
                    return;
                }
            } catch (e) {
                // Backend still down
            }
            // After first failure, show container logs
            if (attempts >= 1) {
                showTerminal();
            }
            seconds = 10;
            countdown();
        }

        function countdown() {
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                checkHealth();
                return;
            }
            seconds--;
            setTimeout(countdown, 1000);
        }

        checkDevBanner();
        countdown();
    </script>
</body>
</html>
